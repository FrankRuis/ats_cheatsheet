<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Against the Storm Cheatsheet</title>
    <link rel="icon" href="img/ats.ico"/>
	<link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/react-beautiful-dnd@13.1.1/dist/react-beautiful-dnd.min.js"></script>
    <script type="text/javascript" src="js/goods.json"></script>
	<script type="text/javascript" src="js/buildings.json"></script>
</head>
<body>
    <div class="content">
        <h1 id="firstHeading" class="firstHeading mw-first-heading"><span class="mw-page-title-main">Against the Storm Cheatsheet</span> <a href="https://github.com/FrankRuis/ats_cheatsheet" target="_blank"><i class="fa-brands fa-github"></i></a></h1>

        <div class="container-block" id="block_1">

        </div>
		
		<hr>
		
        <div class="container-block" id="block_2">

        </div>
		

        <!-- React code -->
        <script type="text/babel">
            const { useState, useEffect } = React;
			const { DragDropContext, Droppable, Draggable } = ReactBeautifulDnd;
            
            // Parse the json string from the goods.json file that we loaded in the html head section
            const GOODS = JSON.parse(goods_data);
			const BUILDINGS = JSON.parse(buildings_data);
            const NEEDS = ['Porridge', 'Biscuits', 'Pie', 'Pickled Goods', 'Jerky', 'Skewers', 'Coats', 'Leisure', 'Religion', 'Education', 'Luxury', 'Brawling', 'Treatment', 'Boots', 'Paste']
			const NEEDTRANS = {'Treatment': 'Tea', 'Leisure': 'Ale', 'Luxury': 'Wine', 'Brawling': 'Training Gear', 'Religion': 'Incense', 'Education': 'Scrolls'}
            const SPECIES = {
                'Human': ['Porridge', 'Biscuits', 'Pie', 'Coats', 'Leisure', 'Religion'],
                'Beaver': ['Pickled Goods', 'Biscuits', 'Coats', 'Leisure', 'Education', 'Luxury'],
                'Harpy': ['Jerky', 'Education', 'Coats', 'Treatment', 'Boots', 'Paste'],
                'Lizard': ['Jerky', 'Pickled Goods', 'Pie', 'Skewers', 'Brawling', 'Boots'],
                'Fox': ['Porridge', 'Pickled Goods', 'Treatment', 'Skewers', 'Religion', 'Boots'],
				'Frog': ['Porridge', 'Pie', 'Brawling', 'Religion', 'Luxury', 'Boots', 'Paste']
            }
			const overlappingNeeds = {};
			for (const species in SPECIES) {
			  const speciesNeeds = SPECIES[species];
			  for (const need of speciesNeeds) {
				if (!(need in overlappingNeeds)) {
				  overlappingNeeds[need] = [];
				}
				overlappingNeeds[need].push(species);
			  }
			}
            const SPECIES_ICONS = {
                'Human': 'img/species/Human_Portrait.png',
                'Beaver': 'img/species/Beaver_Portrait.png',
                'Harpy': 'img/species/Harpy_Portrait.png',
                'Lizard': 'img/species/Lizard_Portrait.png',
                'Fox': 'img/species/Fox_Portrait.png',
				'Frog': 'img/species/Frog_Portrait.png',
                'Biscuits': 'img/goods/Icon_Resource_Biscuits.png',
                'Pie': 'img/goods/Icon_Resource_Pie.png',
                'Porridge': 'img/goods/Icon_Resource_Porridge.png',
                'Pickled Goods': 'img/goods/Icon_Resource_PickledGoods.png',
                'Jerky': 'img/goods/Icon_Resource_Jerky.png',
                'Skewers': 'img/goods/Icon_Resource_Skewers.png',
                'Luxury': 'img/needs/Icon_Need_Luxury.png',
                'Leisure': 'img/needs/Icon_Need_Leisure.png',
                'Treatment': 'img/needs/Icon_Service_Treatment.png',
                'Education': 'img/needs/Icon_Need_Education.png',
                'Brawling': 'img/needs/Icon_Need_Brawling.png',
                'Religion': 'img/needs/Icon_Service_Religion.png',
                'Coats': 'img/goods/Icon_Resource_Coats.png',
				'Boots': 'img/goods/Icon_Resource_Boots_1.png',
				'Paste': 'img/needs/Icon_Resource_Paste.png'
            }

            // Ingredients
            const IngredientGrid = ({ rows, columns }) => {
                const [highlightedSet, setHighlightedSet] = useState(null);
                const [activeElement, setActiveElement] = useState(null);

                const handleIconClick = (iconName) => {
                    const newHighlightedSet = document.getElementById('reverse-ingredients').checked ? GOODS[iconName]['reverse_set'] : GOODS[iconName]['ingredient_sets'];
                    if (highlightedSet) {
                        if (highlightedSet.includes(iconName) || activeElement === iconName) {
                            setHighlightedSet(null);
                            setActiveElement(null);
                        } else {
                            setHighlightedSet(newHighlightedSet);
                            setActiveElement(iconName);
                        }
                    } else {
                        setHighlightedSet(newHighlightedSet);
                        setActiveElement(iconName);
                    }
					document.getElementById("AllButton").click();
                };

                const isIconHighlighted = (iconName) => {
                    if (!highlightedSet || !activeElement) return true;
                    return highlightedSet.flat().includes(iconName) || activeElement === iconName;
                };
				
				const isIconMainHighlighted = (iconName) => {
					return activeElement === iconName;
				};

                const getColor = (iconName) => {
                    // Assumes no ingredient occurs in multiple sets, and at most 3 sets (which is true at the time of writing this)
                    var colors = ['#1e90ff', '#eb4d4b', '#f1f2f6'];
                    if (!highlightedSet || activeElement === iconName || !isIconHighlighted(iconName)) return 'grey';
                    for (let i = 0; i < highlightedSet.length; i++) {
                        if (highlightedSet[i].includes(iconName)) return colors[i];
                    }
                    return 'grey';
                };

                // Generate grid layout from the GOODS keys
                const goodsNames = Object.keys(GOODS);
                const grid = [];
                let index = 0;

                for (let i = 0; i < rows; i++) {
                    const row = [];
                    for (let j = 0; j < columns && index < goodsNames.length; j++) {
                    row.push(goodsNames[index]);
                    index++;
                    }
                    grid.push(row);
                }

                return (
                    <div className="ats-container icon-grid">
                    <div className="grid-header ats-infobox-header-title">
                        {"Ingredient Grid"}
                        <label className="switch tooltip">
                            <span className="tooltiptext">Requires / Needed for</span>
                            <input type="checkbox" id="reverse-ingredients" />
                            <span className="slider slider-round"></span>
                        </label>
                    </div>
                    <div className="icon-grid-wrapper">
                        <div className="icon-row">
                            {grid.map((row, rowIndex) => (
                                row.map((iconName) => (
                                    <div
                                    key={iconName}
                                    className={`ats-single-ingredient-icon icon${isIconHighlighted(iconName) ? (isIconMainHighlighted(iconName) ? ' icon-active' : '') : ' icon-inactive'}`}
                                    onClick={() => handleIconClick(iconName)}
                                    style={{ borderTop: (isIconHighlighted(iconName) && activeElement && activeElement != iconName) ? '5px solid ' + getColor(iconName) : '5px solid rgba(0, 0, 0, 0)' }}
                                    id={iconName}
                                    >
                                    <img src={GOODS[iconName]['icon_path']} alt={iconName} title={iconName} />
                                    </div>
                                ))
                            ))}
                        </div>
                    </div>
                        <div className='grid-legend'>
                            <span className='legend-text'>For recipes, pick one of each highlighted color group.</span>
                        </div>
                    </div>
                );
            };

            // Needs
            const NeedsGrid = ({ rows, columns }) => {
                const [highlightedSet, setHighlightedSet] = useState(null);
                const [activeSpecies, setActiveSpecies] = useState(null);

                const getColors = (iconName) => {
                    if (!highlightedSet || !activeSpecies) return [];
                    var colors = ['purple', 'orange', 'green'];
                    var active_colors = [];
                    for (let i = 0; i < highlightedSet.length; i++) {
                        if (highlightedSet[i].includes(iconName)) active_colors.push(colors[i]);
                    }

                    return active_colors;
                }

                const getLinearGradient = (colors) => {
                    let gradient = 'linear-gradient(to right';
                    const percentage = 100 / colors.length;

                    colors.forEach((color, index) => {
                        gradient += `, ${color} ${percentage * index}%, ${color} ${percentage * (index + 1)}%`;
                    });

                    gradient += ')';
                    return gradient;
                }

                const handleIconClick = (iconName) => {
                    if (!(iconName in SPECIES)) {
                        if (iconName in NEEDTRANS) iconName = NEEDTRANS[iconName];
                        document.getElementById(iconName).click()
                        return;
                    }

                    var newActiveSpecies = activeSpecies;
                    if (activeSpecies) {
                        if (activeSpecies.includes(iconName)) {
                            if (activeSpecies.length == 1) {
                                newActiveSpecies = null;
                                setActiveSpecies(newActiveSpecies);
                            } else {
                                newActiveSpecies.splice(newActiveSpecies.indexOf(iconName), 1);
                                setActiveSpecies(newActiveSpecies);
                            }
                        } else {
                            if (activeSpecies.length >= 3) return;  // max 3 species per game
                            newActiveSpecies.push(iconName);
                            setActiveSpecies(newActiveSpecies);
                        }
                    } else {
                        newActiveSpecies = [iconName];
                        setActiveSpecies(newActiveSpecies);
                    }
                    highlightNeeds(newActiveSpecies);
                };

                const highlightNeeds = (newActiveSpecies) => {
                    var newHighlightedSet = null;
                    if (newActiveSpecies) {
                        for (const iconName of newActiveSpecies) {
                            var names = SPECIES[iconName];
                            names.push(iconName);
                            if (!newHighlightedSet) {
                                newHighlightedSet = [names];
                            } else {
                                newHighlightedSet.push(names);
                            }
                        }
                    }
                    setHighlightedSet(newHighlightedSet);
                }

                const isIconHighlighted = (iconName) => {
                    if (!highlightedSet || !activeSpecies) return true;
                    return highlightedSet.flat().includes(iconName) || activeSpecies.includes(iconName);
                };

                // Generate grid layout from the SPECIES keys
                const speciesNames = Object.keys(SPECIES);
                const grid_header = [];
                const grid = [];
                let index = 0;

                for (let i = 0; i < rows; i++) {
                    const row = [];
                    if (i == 0) {
                        for (let j = 0; j < columns && index < speciesNames.length; j++) {
                            row.push(speciesNames[index]);
                            index++;
                        }
                        index = 0;
                        grid_header.push(row);
                    } else {
                        for (let j = 0; j < columns && index < NEEDS.length; j++) {
                            row.push(NEEDS[index]);
                            index++;
                        }
                        grid.push(row);
                    }
                }

                return (
                    <div className="ats-container icon-grid" style={{maxWidth: '510px'}}>
                        <div className="grid-header ats-infobox-header-title">
                            {"Species Needs"}
                        </div>
                        <div className="icon-grid-wrapper">
                            {grid_header.map((row, rowIndex) => (
                                <div key={rowIndex} className={`icon-row${ rowIndex == 0 ? ' header-row' : '' }`}>
                                {row.map((iconName) => (
                                    <div
                                    key={iconName}
                                    className={`ats-single-ingredient-icon icon${isIconHighlighted(iconName) ? '' : ' icon-inactive'}`}
									id={iconName}
                                    onClick={() => handleIconClick(iconName)}
                                    style={{ borderTop: (isIconHighlighted(iconName) && activeSpecies) ? '5px solid' : '5px solid rgba(0, 0, 0, 0)', borderImage: (isIconHighlighted(iconName) && activeSpecies) ? getLinearGradient(getColors(iconName)) + ' 5' : 'unset' }}
                                    >
                                        <img src={SPECIES_ICONS[iconName]} alt={iconName} title={iconName} />
                                    </div>
                                ))}
                                </div>
                            ))}

                            <div className='icon-row'>
                                {grid.map((row, rowIndex) => (
                                    row.map((iconName) => (
                                        <div
                                        key={iconName}
                                        className={`ats-single-ingredient-icon icon${isIconHighlighted(iconName) ? '' : ' icon-inactive'}`}
                                        onClick={() => handleIconClick(iconName)}
                                        style={{ borderTop: (isIconHighlighted(iconName) && activeSpecies) ? '5px solid' : '5px solid rgba(0, 0, 0, 0)', borderImage: (isIconHighlighted(iconName) && activeSpecies) ? getLinearGradient(getColors(iconName)) + ' 5' : 'unset' }}
                                        >
                                            <img src={SPECIES_ICONS[iconName]} alt={iconName} title={iconName} />
                                        </div>
                                    ))
                                ))}
                            </div>

                        </div>
                    </div>
                );
            };
			
			// Buildings data table
			const DataTable = () => {
				const formattedBuildings = [];
				const per_cat = {};
				for (const building in BUILDINGS) {
					if (BUILDINGS[building]["category"] in per_cat) {
						per_cat[BUILDINGS[building]["category"]].push(building);
					} else {
						per_cat[BUILDINGS[building]["category"]] = [building];
					}
					// building products
					var products = [];
					for (const rec in BUILDINGS[building]["recipes"]) {
						var n = BUILDINGS[building]["recipes"][rec]["product"]["name"];
						if (n in NEEDTRANS) n = NEEDTRANS[n];
						BUILDINGS[building]["recipes"][rec]["product"]["icon_path"] = GOODS[n]["icon_path"];
						BUILDINGS[building]["recipes"][rec]["product"]["grade"] = BUILDINGS[building]["recipes"][rec]["grade"];
						products.push(BUILDINGS[building]["recipes"][rec]["product"]);
					}
				
					// building costs
					var cost = [];
					for (const req in BUILDINGS[building]["requiredGoods"]) {
						var n = BUILDINGS[building]["requiredGoods"][req]["name"];
						var reqGood = GOODS[n];
						cost.push({"amount": BUILDINGS[building]["requiredGoods"][req]["amount"], "icon_path": reqGood["icon_path"], "name": reqGood["displayName"]});
					}
					
					// format building info
					const formattedBuilding = {
						building: BUILDINGS[building].displayName,
						icon: BUILDINGS[building].icon,
						products: products,
						cost: cost,
						id: building,
						category: BUILDINGS[building].category,
					};

					formattedBuildings.push(formattedBuilding);
				}
			
				const [data, setData] = useState(formattedBuildings);
				const [searchTerm, setSearchTerm] = useState('');
				const [sortKey, setSortKey] = useState(null);
				const [sortDirection, setSortDirection] = useState('asc');
				const [activeCats, setActiveCats] = useState(Object.keys(per_cat));
				const [activeFilts, setActiveFilts] = useState(["Products"]);

				const handleSearch = (event) => {
					setSearchTerm(event.target.value);
				};

				const handleSort = (key) => {
					if (sortKey === key) {
						if (sortDirection === 'asc') {
							setSortDirection('desc');
						} else if (sortDirection === 'desc') {
							setSortDirection(null); // Reset to default (no sorting)
						} else {
							setSortDirection('asc');
						}
					} else {
						setSortKey(key);
						setSortDirection('asc');
					}
				};
				
                const handleIconClick = (iconName) => {
                    document.getElementById(iconName).click();
                };

				const sortedData = [...data].sort((a, b) => {
					if (!sortKey || sortDirection === null) return 0; // Check for null sortDirection

					const aValue = a[sortKey];
					const bValue = b[sortKey];

					if (aValue < bValue) return sortDirection === 'asc' ? -1 : 1;
					if (aValue > bValue) return sortDirection === 'asc' ? 1 : -1;
					return 0;
				});
				
				const handleFilter = (filterCat) => {
					if (filterCat === "Costs" || filterCat === "Products") {
						setActiveFilts(prevActiveFilts => {
							const newActiveFilts = [...prevActiveFilts]; // Create a copy
							if (prevActiveFilts.length == Object.keys(per_cat).length) {
								return [filterCat];
							}
							
							const idx = newActiveFilts.indexOf(filterCat);
							if (idx === -1) {
								newActiveFilts.push(filterCat);
							} else {
								newActiveFilts.splice(idx, 1);
							}
							return newActiveFilts;
						});
						return;
					}
				
					if (filterCat === "all") {
						setActiveCats(Object.keys(per_cat));
					} else {
						setActiveCats(prevActiveCats => {
							const newActiveCats = [...prevActiveCats]; // Create a copy
							if (prevActiveCats.length == Object.keys(per_cat).length) {
								return [filterCat];
							}
							
							const idx = newActiveCats.indexOf(filterCat);
							if (idx === -1) {
								newActiveCats.push(filterCat);
							} else {
								newActiveCats.splice(idx, 1);
							}
							return newActiveCats;
						});
					}
				};
				
				const activeIngredient = document.getElementsByClassName("icon-active");
				
				const filteredData = sortedData.filter(item => {
					if (activeCats.indexOf(item.category) == -1) {
						return false;
					}
					
					var cost = JSON.stringify(item.cost);
					var products = JSON.stringify(item.products);
					if (activeFilts.indexOf("Costs") == -1) {
						cost = "";
					}
					if (activeFilts.indexOf("Products") == -1) {
						products = "";
					}
					const searchString = `${item.building} ${products} ${cost}`.toLowerCase(); // Customize search
					if (activeIngredient.length > 0) {
						return searchString.includes('name":"'+activeIngredient[0].id.toLowerCase());
					}
					
					return searchString.includes(searchTerm.toLowerCase());
				});


				return (
					<div className="ats-container icon-grid" style={{ minWidth: '850px' }}>
						<div className="grid-header ats-infobox-header-title">
							{"Buildings"}
						</div>
						<div className="icon-grid-wrapper">
							{(activeIngredient.length == 0) ? 
							<div><input type="text" placeholder="Search" id="SearchInput" value={searchTerm} onChange={handleSearch} /></div>
							:
								<div>
								<button onClick={() => handleFilter("Products")} className={(activeFilts.indexOf("Products") == -1) ? "cat-inactive" : "cat-active"}>Products</button>
								<button onClick={() => handleFilter("Costs")} className={(activeFilts.indexOf("Costs") == -1) ? "cat-inactive" : "cat-active"}>Costs</button>
								<hr/>
								</div>
							}
							<div>
							<button onClick={() => handleFilter("all")} id="AllButton" className={(activeCats.length == Object.keys(per_cat).length) ? "cat-active" : "cat-inactive"}>all</button>
							{Object.keys(per_cat).map((catItem, catIndex) => ( 
								<button key={catItem} onClick={() => handleFilter(catItem)} className={(activeCats.indexOf(catItem) == -1) ? "cat-inactive" : "cat-active"}>{catItem}</button>
							))}
							</div>
							<table className="data-table">
								<thead>
									<tr>
										<th onClick={() => handleSort('building')}>
											Building
											{sortKey === 'building' && (sortDirection === 'asc' ? ' ▲' : sortDirection === 'desc' ? ' ▼' : '')}
										</th>
										<th onClick={() => handleSort('products')}>
											Products
											{sortKey === 'products' && (sortDirection === 'asc' ? ' ▲' : sortDirection === 'desc' ? ' ▼' : '')}
										</th>
										<th onClick={() => handleSort('cost')}>
											Building Cost
											{sortKey === 'cost' && (sortDirection === 'asc' ? ' ▲' : sortDirection === 'desc' ? ' ▼' : '')}
										</th>
										{/* Add more columns as needed */}
									</tr>
								</thead>
								<tbody>
									{filteredData.map((item, index) => (
										<tr key={item.id}>
											<td>
												<img src={item.icon} alt={item.building} style={{ maxWidth: '60px', maxHeight: '60px', margin: '10px' }} />
												{item.building}
											</td>
											<td>
												{item.products.map((productItem, productIndex) => (
												  <div key={productIndex}><img onClick={() => handleIconClick(productItem.name)} alt={productItem.name} src={productItem.icon_path} width="30" height="30"/> {productItem.name} {productItem.grade ? "(" + productItem.grade + ")" : ""}</div>
												))}
											</td>
											<td>
												{item.cost.map((costItem, costIndex) => (
												  <div key={costIndex}>{costItem.amount} <img alt={costItem.name} onClick={() => handleIconClick(costItem.name)} src={costItem.icon_path} width="30" height="30"/> {costItem.name}</div>
												))}
											</td>
										</tr>
									))}
								</tbody>
							</table>
						</div>
					</div>
				);
			};

			// Drag and drop
			const DraggableContainer = () => {
				const [items, setItems] = useState([
					{ id: "ingredients", content: <IngredientGrid rows={9} columns={8} /> },
					{ id: "needs", content: <NeedsGrid rows={4} columns={6} /> },
				]);

				const [direction, setDirection] = useState("horizontal");

				// Detect screen width and adjust direction dynamically
				useEffect(() => {
					const updateDirection = () => {
						setDirection(window.innerWidth < 1380 ? "vertical" : "horizontal");
					};

					updateDirection(); // Set initial value
					window.addEventListener("resize", updateDirection);
					return () => window.removeEventListener("resize", updateDirection);
				}, []);

				const onDragEnd = (result) => {
					if (!result.destination) return; // If dropped outside the list, do nothing

					const newItems = Array.from(items);
					const [movedItem] = newItems.splice(result.source.index, 1);
					newItems.splice(result.destination.index, 0, movedItem);

					setItems(newItems);
				};

				return (
					<DragDropContext onDragEnd={onDragEnd}>
						<Droppable droppableId="droppable-container" direction={direction}>
							{(provided) => (
								<div 
									className="container-block" 
									{...provided.droppableProps} 
									ref={provided.innerRef} 
									style={{ 
										display: "flex", 
										flexDirection: direction === "horizontal" ? "row" : "column", 
									}}
								>
									{items.map((item, index) => (
										<Draggable key={item.id} draggableId={item.id} index={index}>
											{(provided) => (
												<div
													ref={provided.innerRef}
													{...provided.draggableProps}
													{...provided.dragHandleProps}
													className="container-block-item"
													style={{ 
														...provided.draggableProps.style, 
														cursor: "grab", 
													}}
												>
													{item.content}
												</div>
											)}
										</Draggable>
									))}
									{provided.placeholder}
								</div>
							)}
						</Droppable>
					</DragDropContext>
				);
			};
			
			const ImageUploader = () => {
				const [image, setImage] = useState(localStorage.getItem('uploadedImage') || null); // Load from localStorage

				const handleImageUpload = (event) => {
					const file = event.target.files[0];

					if (file) {
						const reader = new FileReader();

						reader.onloadend = () => {
							const base64String = reader.result;
							setImage(base64String);
							localStorage.setItem('uploadedImage', base64String); // Store in localStorage
						};

						reader.readAsDataURL(file);
					}
				};

				const handleClearImage = () => {
					setImage(null);
					localStorage.removeItem('uploadedImage');
				}

				return (
					<div>
						<input type="file" accept="image/*" onChange={handleImageUpload} />
						{image && (
							<div>
								<img src={image} alt="Uploaded Image" style={{ maxWidth: '200px', maxHeight: '200px' }} /> {/* Display image */}
								<button onClick={handleClearImage}>Clear Image</button>
							</div>
						)}
					</div>
				);
			};
			
            // Overlapping Needs
            const OverlappingNeeds = () => {
                const handleIconClick = (iconName) => {
					if (iconName == "None") return;
					if (iconName in NEEDTRANS) iconName = NEEDTRANS[iconName];
					document.getElementById(iconName).click();
                };

                // Generate grid layout from the SPECIES keys
                const needsNames = Object.keys(overlappingNeeds);

				const speciesNames = Object.keys(SPECIES);
				const headerRow = ["None", ...speciesNames];
				const grid = [];
                for (let i = 0; i < needsNames.length; i++) {
                    const row = [needsNames[i]];
					for (let j = 0; j < speciesNames.length; j++) {
						if (overlappingNeeds[needsNames[i]].indexOf(speciesNames[j]) >= 0) {
							row.push(speciesNames[j]);
						} else {
							row.push("None");
						}
					}
					grid.push(row);
                }
				return (
				  <div className="ats-container icon-grid" style={{ maxWidth: '750px' }}>
					<div className="grid-header ats-infobox-header-title">
					  {"Species Needs Overlap"}
					</div>
					<div className="icon-grid-wrapper">
						<div className={`icon-row header-row`} style={{marginBottom: "0"}}>
						{headerRow.map((iconName, iconIndex) => (
							<div
							key={iconName}
							className={`ats-single-ingredient-icon icon`}
							onClick={() => handleIconClick(iconName)}
							>
								<img style={iconName == "None" ? {visibility: "hidden"} : {}} src={iconName == "None" ? "data:," : SPECIES_ICONS[iconName]} alt={iconName} title={iconName} />
							</div>
						))}
						</div>

					  {grid.map((row, rowIndex) => (
						<div className='icon-row' key={rowIndex}>
						  {row.map((iconName, iconIndex) => (
							<div
							  key={iconIndex}
							  className={`ats-single-ingredient-icon icon`}
							  style={(iconIndex == 0) ? {borderRight: "solid 4px #4f3c21", paddingRight: "15px", marginBottom: "0", marginTop: "0"} : {}}
							  onClick={() => handleIconClick(iconName)}
							>
							  <img style={iconName == "None" ? {visibility: "hidden"} : {}} src={iconName == "None" ? "data:," : SPECIES_ICONS[iconName]} alt={iconName} title={iconName} />
							</div>
						  ))}
						</div>
					  ))}
					</div>
				  </div>
				);
            };
			
			ReactDOM.render(<DraggableContainer />, document.querySelector("#block_1"));
			
			// Raw resources: from wiki "Raw Food" + "Raw Crafting Materials" + Wood + Water + Sea Marrow.
			// https://wiki.hoodedhorse.com/Against_the_Storm/Resources
			const RAW_RESOURCES = [
				'Berries', 'Eggs', 'Fish', 'Insects', 'Meat', 'Mushrooms', 'Roots', 'Vegetables',
				'Algae', 'Clay', 'Copper Ore', 'Crystalized Dew', 'Grain', 'Herbs', 'Leather',
				'Plant Fibre', 'Reeds', 'Resin', 'Salt', 'Scales', 'Stone', 'Wood',
				'Sea Marrow',
				'Drizzle Water', 'Clearance Water', 'Storm Water'
			];

			const INGREDIENT_GROUP_COLORS = ['#1e90ff', '#eb4d4b', '#f1f2f6'];
			const INGREDIENT_GROUP_COLORS_ALPHA = ['#1e90ff66', '#eb4d4b66', '#f1f2f699'];
			const INGREDIENT_GROUP_NAMES = ['blue', 'red', 'gray'];

			const isRawResource = (name) => RAW_RESOURCES.includes(name);

			const NEEDED_GOODS = [...new Set(NEEDS.map(n => NEEDTRANS[n] || n))].filter(g => GOODS[g]).sort();
			const TRANSITIONAL_GOODS = Object.keys(GOODS)
				.filter(g => !isRawResource(g) && GOODS[g].ingredient_sets && GOODS[g].ingredient_sets.length > 0 && !NEEDED_GOODS.includes(g))
				.sort();
			const ingredientsUsedByNeededGoods = new Set();
			NEEDED_GOODS.forEach(need => {
				const good = GOODS[need];
				if (good && good.ingredient_sets) {
					good.ingredient_sets.forEach(group => group.forEach(ing => ingredientsUsedByNeededGoods.add(ing)));
				}
			});
			const TRANSITIONAL_FOR_NEEDED = TRANSITIONAL_GOODS.filter(g => ingredientsUsedByNeededGoods.has(g));
			const OTHER_GOODS = TRANSITIONAL_GOODS.filter(g => !ingredientsUsedByNeededGoods.has(g));
			const SERVICE_BUILDINGS = Object.entries(BUILDINGS)
				.filter(([, b]) => b.category === 'City Buildings')
				.map(([id]) => id)
				.sort();
			const NEED_TO_SERVICE_BUILDINGS = {};
			SERVICE_BUILDINGS.forEach(bid => {
				const b = BUILDINGS[bid];
				if (b.recipes) {
					b.recipes.forEach(r => {
						const need = (r.servedNeed || r.product?.name || '').trim();
						if (need) {
							const norm = need === 'Leasiure' ? 'Leisure' : need;
							if (!(norm in NEED_TO_SERVICE_BUILDINGS)) NEED_TO_SERVICE_BUILDINGS[norm] = [];
							if (!NEED_TO_SERVICE_BUILDINGS[norm].includes(bid)) NEED_TO_SERVICE_BUILDINGS[norm].push(bid);
						}
					});
				}
			});

			const isIngredientAvailable = (ingredient, rawSet, visited = new Set()) => {
				if (visited.has(ingredient)) return false;
				if (!GOODS[ingredient]) return false;
				if (isRawResource(ingredient)) return rawSet.has(ingredient);
				const sets = GOODS[ingredient].ingredient_sets;
				if (!sets || sets.length === 0) return false;
				visited.add(ingredient);
				const available = sets.every(group =>
					group.some(ing => isIngredientAvailable(ing, rawSet, visited))
				);
				visited.delete(ingredient);
				return available;
			};

			const getFirstAvailableInGroup = (group, rawSet) =>
				group.find(ing => isIngredientAvailable(ing, rawSet));

			const getMinRawsToAddForIngredient = (ingredient, rawSet, visited = new Set()) => {
				if (visited.has(ingredient)) return Infinity;
				if (!GOODS[ingredient]) return Infinity;
				if (isRawResource(ingredient)) return rawSet.has(ingredient) ? 0 : 1;
				const sets = GOODS[ingredient].ingredient_sets;
				if (!sets || sets.length === 0) return Infinity;
				visited.add(ingredient);
				let total = 0;
				for (const group of sets) {
					const minCost = Math.min(...group.map(ing => getMinRawsToAddForIngredient(ing, rawSet, visited)));
					total += minCost;
				}
				visited.delete(ingredient);
				return total;
			};

			const getMinRawsToAdd = (goodName, currentRawResources) => {
				const rawSet = new Set(currentRawResources);
				const good = GOODS[goodName];
				if (!good || !good.ingredient_sets) return 0;
				let total = 0;
				for (const group of good.ingredient_sets) {
					const minCost = Math.min(...group.map(ing => getMinRawsToAddForIngredient(ing, rawSet)));
					total += minCost;
				}
				return total;
			};

			const getLookOutFor = (goodName, currentRawResources, hasRecipeBuilding = [], need = null, hasServiceBuilding = []) => {
				const rawSet = new Set(currentRawResources);
				const good = GOODS[goodName];
				if (!good || !good.ingredient_sets) return [];
				const suggestions = [];
				const buildingGoodsAdded = new Set();
				if (need && need in NEEDTRANS && NEED_TO_SERVICE_BUILDINGS[need]) {
					const providers = NEED_TO_SERVICE_BUILDINGS[need];
					if (!providers.some(bid => hasServiceBuilding.includes(bid))) {
						suggestions.push({ type: 'service_building', need });
					}
				}
				const addBuildingSuggestion = (g) => {
					if (!hasRecipeBuilding.includes(g) && !buildingGoodsAdded.has(g) && isIngredientAvailable(g, rawSet)) {
						buildingGoodsAdded.add(g);
						suggestions.push({ type: 'building', good: g });
					}
				};
				if (!hasRecipeBuilding.includes(goodName)) {
					suggestions.push({ type: 'building', good: goodName });
					buildingGoodsAdded.add(goodName);
				}
				good.ingredient_sets.forEach((group, i) => {
					group.filter(ing => !isRawResource(ing)).forEach(ing => {
						if (isIngredientAvailable(ing, rawSet)) addBuildingSuggestion(ing);
					});
				});
				good.ingredient_sets.forEach((group, i) => {
					const satisfier = getFirstAvailableInGroup(group, rawSet);
					if (satisfier) return;
					const rawOptions = group.filter(ing => isRawResource(ing) && !rawSet.has(ing));
					const transitionalOptions = group.filter(ing => !isRawResource(ing) && !isIngredientAvailable(ing, rawSet));
					if (rawOptions.length > 0) {
						const colorAlpha = INGREDIENT_GROUP_COLORS_ALPHA[i] || INGREDIENT_GROUP_COLORS_ALPHA[0];
						suggestions.push({ type: 'raw', icons: rawOptions, colorAlpha });
					} else if (transitionalOptions.length > 0) {
						transitionalOptions.forEach(ing => {
							if (!hasRecipeBuilding.includes(ing) && buildingGoodsAdded.has(ing)) {
								buildingGoodsAdded.add(ing);
								suggestions.push({ type: 'building', good: ing });
							}
							const hasBothBuildings = hasRecipeBuilding.includes(goodName) && hasRecipeBuilding.includes(ing);
							if (!hasBothBuildings) {
								suggestions.push({ type: 'trader', good: ing });
							}
						});
					}
				});
				return suggestions;
			};

			const getSortedNeeds = (activeSpecies, currentRawResources, hasRecipeBuilding = [], hasServiceBuilding = []) => {
				const isNeedRowDimmed = (need) => {
					if (!activeSpecies) return false;
					const needSpecies = overlappingNeeds[need] || [];
					return needSpecies.length > 0 && needSpecies.every(s => !activeSpecies.includes(s));
				};
				const getLookOutForCount = (need) => {
					return getLookOutFor(NEEDTRANS[need] || need, currentRawResources, hasRecipeBuilding, need, hasServiceBuilding).length;
				};
				return [...NEEDS].sort((a, b) => {
					const dimmedA = isNeedRowDimmed(a) ? 1 : 0;
					const dimmedB = isNeedRowDimmed(b) ? 1 : 0;
					if (dimmedA !== dimmedB) return dimmedA - dimmedB;
					const rawsA = getMinRawsToAdd(NEEDTRANS[a] || a, currentRawResources);
					const rawsB = getMinRawsToAdd(NEEDTRANS[b] || b, currentRawResources);
					if (rawsA !== rawsB) {
						if (rawsA === Infinity) return 1;
						if (rawsB === Infinity) return -1;
						return rawsA - rawsB;
					}
					const lookOutA = getLookOutForCount(a);
					const lookOutB = getLookOutForCount(b);
					if (lookOutA !== lookOutB) return lookOutA - lookOutB;
					const speciesA = (overlappingNeeds[a] || []).length;
					const speciesB = (overlappingNeeds[b] || []).length;
					return speciesB - speciesA;
				});
			};

			const IngredientTree = ({ goodName, currentRawResources, handleIconClick, depth = 0 }) => {
				const rawSet = new Set(currentRawResources);
				const good = GOODS[goodName];
				if (!good || !good.ingredient_sets || good.ingredient_sets.length === 0) return null;

				const sets = good.ingredient_sets;
				const satisfiers = sets.map(group => getFirstAvailableInGroup(group, rawSet));
				return (
					<div className="ingredient-tree-container">
						<div className="ingredient-tree-row" style={{ display: 'grid', gridTemplateColumns: `repeat(${sets.length}, 1fr)`, gap: 4 }}>
							{sets.map((group, i) => {
								const satisfier = satisfiers[i];
								const rawCheckedInGroup = group.filter(ing => isRawResource(ing) && rawSet.has(ing));
								const rawAltCount = rawCheckedInGroup.length - 1;
								const showRawAltCount = rawAltCount > 0;
								const rawTooltip = showRawAltCount
									? rawCheckedInGroup.map(ing => GOODS[ing]?.displayName || ing).join(', ')
									: null;
								const color = INGREDIENT_GROUP_COLORS_ALPHA[i] || INGREDIENT_GROUP_COLORS_ALPHA[0];
								return (
									<div
										key={i}
										className="ingredient-group-box"
										style={{ backgroundColor: color }}
										onClick={() => satisfier && handleIconClick(satisfier)}
									>
										{satisfier ? (
											<>
												<span className="group-check"><i className="fa-solid fa-check"></i></span>
												<span title={rawTooltip || (GOODS[satisfier] && GOODS[satisfier].displayName)} style={{ display: 'inline-flex', alignItems: 'center' }}>
													{GOODS[satisfier] && (
														<img
															src={GOODS[satisfier].icon_path}
															alt={GOODS[satisfier].displayName}
															onClick={(e) => { e.stopPropagation(); handleIconClick(satisfier); }}
														/>
													)}
													{showRawAltCount && <span className="ingredient-group-raw-alt">+{rawAltCount}</span>}
												</span>
											</>
										) : null}
									</div>
								);
							})}
						</div>
						<div className="ingredient-tree-columns" style={{ display: 'grid', gridTemplateColumns: `repeat(${sets.length}, 1fr)`, gap: 8 }}>
							{sets.map((group, i) => {
								const satisfier = satisfiers[i];
								return (
									<div key={i} className="ingredient-tree-column">
										{satisfier && !isRawResource(satisfier) && (
											<IngredientTree
												goodName={satisfier}
												currentRawResources={currentRawResources}
												handleIconClick={handleIconClick}
												depth={depth + 1}
											/>
										)}
									</div>
								);
							})}
						</div>
					</div>
				);
			};

			const SuggestorContent = () => {
				const [currentRawResources, setCurrentRawResources] = useState([]);
				const [activeSpecies, setActiveSpecies] = useState(null);
				const [hasRecipeBuilding, setHasRecipeBuilding] = useState([]);
				const [hasServiceBuilding, setHasServiceBuilding] = useState([]);

				const handleRecipeBuildingChange = (good) => {
					setHasRecipeBuilding(prev => prev.includes(good) ? prev.filter(g => g !== good) : [...prev, good]);
				};

				const handleServiceBuildingChange = (buildingId) => {
					setHasServiceBuilding(prev => prev.includes(buildingId) ? prev.filter(b => b !== buildingId) : [...prev, buildingId]);
				};

				const handleCheckboxChange = (resource) => {
					setCurrentRawResources(prev => {
						if (prev.includes(resource)) {
							return prev.filter(r => r !== resource);
						} else {
							return [...prev, resource];
						}
					});
				};

				const handleSpeciesClick = (species) => {
					setActiveSpecies(prev => {
						if (!prev) return [species];
						if (prev.includes(species)) {
							const next = prev.filter(s => s !== species);
							return next.length ? next : null;
						}
						if (prev.length >= 3) return prev;
						return [...prev, species];
					});
				};

				const handleIconClick = (resource) => {
					if (document.getElementById(resource)) document.getElementById(resource).click();
				};

				const speciesNames = Object.keys(SPECIES);
				const isSpeciesLit = (species) => !activeSpecies || activeSpecies.includes(species);
				const isNeedRowDimmed = (need) => {
					if (!activeSpecies) return false;
					const needSpecies = overlappingNeeds[need] || [];
					return needSpecies.length > 0 && needSpecies.every(s => !activeSpecies.includes(s));
				};

				return (
					<div>
						<div className="ats-container icon-grid" style={{ maxWidth: '1200px', marginBottom: '15px' }}>
							<div className="grid-header ats-infobox-header-title">Species</div>
							<div className="icon-grid-wrapper">
								<div className="icon-row header-row">
									{speciesNames.map(species => (
										<div
											key={species}
											className={`ats-single-ingredient-icon icon${isSpeciesLit(species) ? '' : ' icon-inactive'}`}
											onClick={() => handleSpeciesClick(species)}
											style={{ cursor: 'pointer' }}
										>
											<img src={SPECIES_ICONS[species]} alt={species} title={species} />
										</div>
									))}
								</div>
							</div>
						</div>
						<div className="ats-container icon-grid suggestor-main" style={{ maxWidth: '1200px', display: 'flex', flexDirection: 'row', gap: '20px', alignItems: 'flex-start' }}>
							<div style={{ flex: '0 0 auto', minWidth: '220px', textAlign: 'left' }}>
								<div className="grid-header ats-infobox-header-title">Raw resources</div>
								<div className="icon-grid-wrapper">
									<div style={{ display: 'flex', flexDirection: 'column', padding: '8px 0' }}>
										{RAW_RESOURCES.map(resource => (
											<label key={resource} className="suggestor-raw-resource">
												<input
													type="checkbox"
													checked={currentRawResources.includes(resource)}
													onChange={() => handleCheckboxChange(resource)}
												/>
												{GOODS[resource] && (
													<img
														src={GOODS[resource].icon_path}
														alt={GOODS[resource].displayName}
														title={GOODS[resource].displayName}
														onClick={() => handleIconClick(resource)}
													/>
												)}
												<span>{GOODS[resource] ? GOODS[resource].displayName : resource}</span>
											</label>
										))}
									</div>
								</div>
							</div>
							<div style={{ flex: '1 1 auto', minWidth: '300px' }} className="suggestor-suggested-need">
								<div className="grid-header ats-infobox-header-title">Suggested Need</div>
								<div className="icon-grid-wrapper">
									<table className="data-table suggestor-data-table">
										<thead>
											<tr>
												<th>Needed Good</th>
												<th>Species</th>
												<th>Look out for</th>
											</tr>
										</thead>
										<tbody>
											{getSortedNeeds(activeSpecies, currentRawResources, hasRecipeBuilding, hasServiceBuilding).map(need => (
												<tr key={need} className={isNeedRowDimmed(need) ? 'suggestor-row-dimmed' : ''}>
													<td>
														<img
															src={SPECIES_ICONS[need] || (NEEDTRANS[need] && GOODS[NEEDTRANS[need]] && GOODS[NEEDTRANS[need]].icon_path)}
															alt={need}
															style={{ maxWidth: '60px', maxHeight: '60px', margin: '10px' }}
															onClick={() => handleIconClick(NEEDTRANS[need] || need)}
														/>
														{need}
														<IngredientTree
															goodName={NEEDTRANS[need] || need}
															currentRawResources={currentRawResources}
															handleIconClick={handleIconClick}
														/>
													</td>
													<td>
														{overlappingNeeds[need] && overlappingNeeds[need].map((species) => (
															<div key={species} className={!isSpeciesLit(species) ? 'suggestor-dimmed' : ''}>
																<img onClick={() => handleIconClick(species)} alt={species} src={SPECIES_ICONS[species]} width="30" height="30"/> <span>{species}</span>
															</div>
														))}
													</td>
													<td>
														{getLookOutFor(NEEDTRANS[need] || need, currentRawResources, hasRecipeBuilding, need, hasServiceBuilding).map((s, idx) => (
															<div key={idx} className="look-out-for-item">
																{s.type === 'service_building' ? (
																	<>
																		<span>Building to provide </span>
																		{SPECIES_ICONS[s.need] && (
																			<img
																				src={SPECIES_ICONS[s.need]}
																				alt={s.need}
																				title={s.need}
																				width="24"
																				height="24"
																				onClick={() => handleIconClick(NEEDTRANS[s.need] || s.need)}
																				style={{ cursor: 'pointer', verticalAlign: 'middle', marginRight: 4 }}
																			/>
																		)}
																	</>
																) : s.type === 'building' ? (
																	<>
																		<span>Building with a </span>
																		{GOODS[s.good] && (
																			<img
																				src={GOODS[s.good].icon_path}
																				alt={GOODS[s.good].displayName}
																				title={GOODS[s.good].displayName}
																				width="24"
																				height="24"
																				onClick={() => handleIconClick(s.good)}
																				style={{ cursor: 'pointer', verticalAlign: 'middle', marginRight: 4 }}
																			/>
																		)}
																		<span> recipe</span>
																	</>
																) : s.type === 'raw' ? (
																	<span
																		className="look-out-for-raw-group"
																		style={{ backgroundColor: s.colorAlpha }}
																	>
																		<span>One of </span>
																		{s.icons.filter(ing => GOODS[ing]).map(ing => (
																			<img
																				key={ing}
																				src={GOODS[ing].icon_path}
																				alt={GOODS[ing].displayName}
																				title={GOODS[ing].displayName}
																				width="24"
																				height="24"
																				onClick={() => handleIconClick(ing)}
																				style={{ cursor: 'pointer', verticalAlign: 'middle', margin: '0 1px' }}
																			/>
																		))}
																	</span>
																) : (
																	<>
																		{GOODS[s.good] && (
																			<img
																				src={GOODS[s.good].icon_path}
																				alt={GOODS[s.good].displayName}
																				title={GOODS[s.good].displayName}
																				width="24"
																				height="24"
																				onClick={() => handleIconClick(s.good)}
																				style={{ cursor: 'pointer', verticalAlign: 'middle', marginRight: 4 }}
																			/>
																		)}
																		<span>for sale at a trader</span>
																	</>
																)}
															</div>
														))}
													</td>
												</tr>
											))}
										</tbody>
									</table>
								</div>
							</div>
							<div style={{ flex: '0 0 auto', minWidth: '220px', textAlign: 'left' }}>
								<div className="grid-header ats-infobox-header-title">Have Recipe Building</div>
								<div className="icon-grid-wrapper">
									<div style={{ display: 'flex', flexDirection: 'column', padding: '8px 0' }}>
										<div style={{ fontWeight: 600, marginBottom: 4 }}>Transitional</div>
										{TRANSITIONAL_FOR_NEEDED.map(good => (
											<label key={good} className="suggestor-raw-resource">
												<input
													type="checkbox"
													checked={hasRecipeBuilding.includes(good)}
													onChange={() => handleRecipeBuildingChange(good)}
												/>
												{GOODS[good] && (
													<img
														src={GOODS[good].icon_path}
														alt={GOODS[good].displayName}
														title={GOODS[good].displayName}
														onClick={() => handleIconClick(good)}
														style={{ cursor: 'pointer' }}
													/>
												)}
												<span>{GOODS[good] ? GOODS[good].displayName : good}</span>
											</label>
										))}
										<div style={{ fontWeight: 600, marginTop: 12, marginBottom: 4 }}>Needed goods</div>
										{NEEDED_GOODS.map(good => (
											<label key={good} className="suggestor-raw-resource">
												<input
													type="checkbox"
													checked={hasRecipeBuilding.includes(good)}
													onChange={() => handleRecipeBuildingChange(good)}
												/>
												{GOODS[good] && (
													<img
														src={GOODS[good].icon_path}
														alt={GOODS[good].displayName}
														title={GOODS[good].displayName}
														onClick={() => handleIconClick(good)}
														style={{ cursor: 'pointer' }}
													/>
												)}
												<span>{GOODS[good] ? GOODS[good].displayName : good}</span>
											</label>
										))}
										<div style={{ fontWeight: 600, marginTop: 12, marginBottom: 4 }}>Service Buildings</div>
										{SERVICE_BUILDINGS.map(bid => (
											<label key={bid} className="suggestor-raw-resource">
												<input
													type="checkbox"
													checked={hasServiceBuilding.includes(bid)}
													onChange={() => handleServiceBuildingChange(bid)}
												/>
												{BUILDINGS[bid] && (
													<img
														src={BUILDINGS[bid].icon}
														alt={BUILDINGS[bid].displayName}
														title={BUILDINGS[bid].displayName}
														style={{ cursor: 'pointer' }}
													/>
												)}
												<span>{BUILDINGS[bid] ? BUILDINGS[bid].displayName : bid}</span>
											</label>
										))}
										<div style={{ fontWeight: 600, marginTop: 12, marginBottom: 4 }}>Other</div>
										{OTHER_GOODS.map(good => (
											<label key={good} className="suggestor-raw-resource">
												<input
													type="checkbox"
													checked={hasRecipeBuilding.includes(good)}
													onChange={() => handleRecipeBuildingChange(good)}
												/>
												{GOODS[good] && (
													<img
														src={GOODS[good].icon_path}
														alt={GOODS[good].displayName}
														title={GOODS[good].displayName}
														onClick={() => handleIconClick(good)}
														style={{ cursor: 'pointer' }}
													/>
												)}
												<span>{GOODS[good] ? GOODS[good].displayName : good}</span>
											</label>
										))}
									</div>
								</div>
							</div>
						</div>
					</div>
				);
			};

			const TABS = [
				{ id: 'buildings-table', label: 'Buildings', content: <DataTable /> },
				{ id: 'overlapping-needs', label: 'Needs Info', content: <OverlappingNeeds /> },
				{ id: 'suggestor', label: 'Suggestor', content: <SuggestorContent /> },
			];

			const TabsComponent = () => {
				const [activeTab, setActiveTab] = useState(TABS[0].id);

				return (
					<div>
						<div className="tabs">
							{TABS.map(tab => (
								<button
									key={tab.id}
									className={`tab ${activeTab === tab.id ? 'active' : ''}`}
									onClick={() => setActiveTab(tab.id)}
								>
									{tab.label}
								</button>
							))}
						</div>
						<div className="tab-content">
							{TABS.find(tab => tab.id === activeTab).content}
						</div>
					</div>
				);
			};

			// Replace ReactDOM.render with this:
			ReactDOM.render(<TabsComponent />, document.querySelector("#block_2"));
        </script>
    </div>
</body>
</html>
